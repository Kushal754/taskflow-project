<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Lista Semántica Dinámica</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Mi Lista Semántica</h1>
        <div class="perfil">
            <input type="text" id="buscador" placeholder="🔍 Buscar tarea..." class="input-buscador">
            <span class="icono-perfil">👤</span>
        </div>
    </header>

    <div class="layout-principal">
        
        <aside>
            <nav class="menu-lateral">
                <a href="#" class="activo">📋 Todas</a>
                <a href="#">⏳ Pendientes</a>
                <a href="#">✅ Completadas</a>
            </nav>
            
            <div class="categorias">
                <h3>Añadir Tarea</h3>

                <form id="formulario-tarea" class="formulario">
    <input type="text" id="input-tarea" placeholder="Escribe una nueva tarea..." required>
    
    <select id="select-categoria" class="input-buscador">
        <option value="hogar">Hogar</option>
        <option value="trabajo">Trabajo</option>
        <option value="personal">Personal</option>
        <option value="estudio">Estudio</option>
        <option value="salud">Salud</option>
    </select>
    
    <button type="submit" class="btn-nuevo">+ Añadir</button>
</form>
            </div>
        </aside>

        <main>
            <h2>Tareas por Hacer</h2>
            
            <section class="contenedor-tareas" id="lista-tareas">
                </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
